<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <!-- Left product box -->
  <rect x="80" y="150" width="180" height="300" fill="white" stroke="#ddd" stroke-width="2" rx="8"/>
  <text x="170" y="260" font-size="48" font-weight="bold" fill="#dc2626" text-anchor="middle">5G</text>
  <text x="170" y="320" font-size="18" font-weight="bold" fill="#999" text-anchor="middle">OUTDOOR</text>
  
  <!-- Right router box -->
  <rect x="900" y="200" width="120" height="200" fill="white" stroke="#ddd" stroke-width="2" rx="8"/>
  <text x="960" y="300" font-size="16" font-weight="bold" fill="#999" text-anchor="middle">Router</text>
  
  <!-- Connecting wave line -->
  <path d="M 260 300 Q 350 280, 440 300 T 620 300 T 800 300 T 900 300" stroke="#dc2626" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Main 5G circle badge -->
  <circle cx="600" cy="150" r="80" fill="#dc2626"/>
  <text x="600" y="170" font-size="100" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">5G</text>
  
  <!-- SmartConnect text -->
  <text x="600" y="290" font-size="72" font-weight="bold" fill="#dc2626" text-anchor="middle">smart connect</text>
  
  <!-- Home & Office WiFi -->
  <text x="600" y="360" font-size="40" font-weight="bold" fill="#dc2626" text-anchor="middle">Home & Office WiFi</text>
  
  <!-- Price badge (rounded rectangle) -->
  <rect x="320" y="420" width="560" height="100" fill="#dc2626" rx="50"/>
  
  <!-- Price text -->
  <text x="360" y="450" font-size="32" font-weight="bold" fill="white">₦25,000</text>
  <text x="360" y="485" font-size="18" font-weight="bold" fill="white">+ Unlimited Data</text>
  <text x="360" y="515" font-size="16" fill="white">Valid for 30 days</text>
  
  <!-- CTA text at bottom -->
  <text x="600" y="560" font-size="18" fill="#999" text-anchor="middle">Visit the nearest Airtel Shop to get yours.</text>
  
  <!-- Airtel logo -->
  <text x="1100" y="80" font-size="40" font-weight="bold" fill="#dc2626" text-anchor="end">airtel</text>
</svg>